<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control ROAS — Dashboard interno de métricas publicitarias</title>
<meta name="description" content="Herramienta interna para equipos de marketing que permite visualizar el rendimiento de sus propias cuentas publicitarias vía API oficial.">
<meta name="robots" content="noindex,nofollow">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b96;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --radius:8px;--radius-lg:12px;
  --blue:#1877F2;--blue-bg:#e8f0fd;--blue-tc:#0d47a1;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-tc:#085041;
  --amber:#EF9F27;--amber-bg:#FAEEDA;--amber-tc:#633806;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-tc:#791F1F;
  --gray:#888780;--gray-bg:#F1EFE8;--gray-tc:#2C2C2A;
  --sidebar:220px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --text:#f0efe9;--text2:#a0a09a;--text3:#6b6b67;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --blue-bg:#1a2a4a;--blue-tc:#90b8f8;
  --green-bg:#0d2b22;--green-tc:#9FE1CB;
  --amber-bg:#2b1f08;--amber-tc:#FAC775;
  --red-bg:#2b0f0f;--red-tc:#F7C1C1;
  --gray-bg:#2a2a27;--gray-tc:#D3D1C7;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;transition:background .12s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-fb{display:flex;align-items:center;gap:10px;padding:12px 20px;background:#1877F2;color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;width:100%;justify-content:center}

/* ── INPUTS ── */
.inp{width:100%;padding:8px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text)}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh}
.app-layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar-logo{padding:20px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-nav{flex:1;padding:12px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border:none;background:none;width:100%;text-align:left}
.nav-item.active{background:var(--blue-bg);color:var(--blue)}
.nav-item svg{width:16px;height:16px}

.main{flex:1;min-width:0;padding:24px}
.page{display:none}
.page.active{display:block}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:18px;font-weight:700}

/* ── METRIC TOGGLE DROPDOWN ── */
.metrics-dropdown{position:relative;display:inline-block}
.metrics-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;cursor:pointer;font-weight:500}
.metrics-content{display:none;position:absolute;right:0;top:100%;margin-top:8px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:12px;box-shadow:0 10px 25px rgba(0,0,0,0.1);z-index:100;min-width:220px}
.metrics-content.show{display:block}
.metric-option{display:flex;align-items:center;gap:10px;padding:6px 8px;cursor:pointer;border-radius:6px;font-size:13px}
.metric-option:hover{background:var(--bg2)}
.metric-option input{accent-color:var(--blue);width:15px;height:15px}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase}
.stat-value{font-size:22px;font-weight:700}

/* ── TABLES ── */
.tbl-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:12px;font-weight:600;font-size:11px;color:var(--text2);text-transform:uppercase;background:var(--bg2);border-bottom:1px solid var(--border)}
td{padding:12px;border-bottom:1px solid var(--border)}
tr.clickable:hover td{background:var(--bg2);cursor:pointer}

/* ── PROGRESS BAR ── */
.prog{display:flex;align-items:center;gap:7px;min-width:100px}
.prog-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}

/* ── TOP ADS (HORIZONTAL REDESIGN) ── */
.top-ads-section{margin-top:16px;border-top:1px solid var(--border);padding-top:16px}
.top-ads-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.top-ads-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase}
.ads-horizontal-scroll{display:flex;flex-direction:column;gap:10px}
.ad-row-card{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;height:110px;transition:transform 0.2s}
.ad-row-card:hover{border-color:var(--blue)}
.ad-row-thumb{width:110px;height:110px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.ad-row-body{flex:1;padding:12px;display:flex;flex-direction:row;align-items:center;gap:20px;min-width:0}
.ad-row-info{flex:1;min-width:0}
.ad-row-name{font-size:12px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-row-meta{font-size:11px;color:var(--text3)}

/* ── AD PERFORMANCE MINI CHART ── */
.ad-perf-chart{width:220px;display:flex;flex-direction:column;gap:6px;padding:0 15px;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.perf-bar-group{display:flex;flex-direction:column;gap:2px}
.perf-label-row{display:flex;justify-content:space-between;font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase}
.perf-bar-bg{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;width:100%}
.perf-bar-fill{height:100%;border-radius:3px}

.ad-row-main-metrics{display:flex;gap:15px;padding-right:10px}
.ad-main-metric{text-align:center;min-width:70px}
.ad-main-metric .label{font-size:9px;color:var(--text3);text-transform:uppercase;margin-bottom:2px}
.ad-main-metric .val{font-size:14px;font-weight:800}

/* ── MISC ── */
.badge{padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600}
.loading{padding:40px;text-align:center;color:var(--text3)}

/* LOGIN SCREEN (simplified for this snippet) */
#configScreen{max-width:450px;margin:100px auto;text-align:center}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="configScreen">
    <h1 style="margin-bottom:10px">Control ROAS</h1>
    <p style="color:var(--text2);margin-bottom:20px">Dashboard de métricas publicitarias</p>
    <div style="background:white;padding:24px;border-radius:12px;border:1px solid var(--border)">
        <input class="inp" id="appIdInput" placeholder="Meta App ID" style="margin-bottom:12px">
        <button class="btn-fb" onclick="initFBLogin()">Iniciar sesión con Facebook</button>
        <p id="alertMsg" style="color:var(--red);font-size:12px;margin-top:10px;display:none"></p>
    </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><strong>Control ROAS</strong></div>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="switchPage('overview')">Vista General</button>
        <button class="nav-item" onclick="switchPage('detail')">Detalle de cuentas</button>
      </nav>
      <div style="padding:16px;border-top:1px solid var(--border)">
        <button class="btn btn-sm" style="width:100%" onclick="logout()">Cerrar Sesión</button>
      </div>
    </aside>

    <main class="main">
      <!-- OVERVIEW -->
      <div class="page active" id="page-overview">
        <div class="page-header"><div class="page-title">Vista General</div></div>
        <div class="stat-grid" id="summaryCards"></div>
        <div class="tbl-wrap">
            <table id="overviewTable">
                <thead><tr><th>Cuenta</th><th>Objetivo</th><th>Progreso</th><th>Facturado</th><th>ROAS</th><th>Estado</th></tr></thead>
                <tbody id="overviewBody"></tbody>
            </table>
        </div>
      </div>

      <!-- DETAIL -->
      <div class="page" id="page-detail">
        <div class="page-header">
          <div class="page-title">Detalle de cuentas</div>
          <div class="metrics-dropdown">
            <button class="metrics-btn" onclick="toggleMetricsMenu()">
                <span>⚙ Métricas visibles</span>
                <span style="font-size:10px">▼</span>
            </button>
            <div class="metrics-content" id="metricsMenu">
                <div style="font-weight:700;font-size:10px;color:var(--text3);margin-bottom:8px;text-transform:uppercase">Seleccionar métricas</div>
                <!-- Generado dinámicamente -->
            </div>
          </div>
        </div>
        
        <div class="tbl-wrap">
          <table>
            <thead id="detailHead"></thead>
            <tbody id="detailBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
// ══════════════════════════════════════
// STATE & CONFIG
// ══════════════════════════════════════
let accessToken = '';
let accountsData = [];
let settings = JSON.parse(localStorage.getItem('cr_settings') || '{}');

const METRICS_DEFS = [
    { key: 'spend', label: 'Invertido', always: true },
    { key: 'revenue', label: 'Facturado', always: true },
    { key: 'roas', label: 'ROAS', always: true },
    { key: 'clicks', label: 'Clics' },
    { key: 'ctr', label: 'CTR' },
    { key: 'purchases', label: 'Compras' },
    { key: 'costPerPurchase', label: 'Costo/Compra' },
    { key: 'messages', label: 'Mensajes' }
];

let visibleMetrics = new Set(['spend', 'revenue', 'roas', 'purchases', 'costPerPurchase']);

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
const fmtN = n => new Intl.NumberFormat('es-AR').format(Math.round(n || 0));
const fmtDec = n => new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n || 0);

function toggleMetricsMenu() {
    document.getElementById('metricsMenu').classList.toggle('show');
}

function initFBLogin() {
    // Simulación de login para demostración funcional del UI
    const appId = document.getElementById('appIdInput').value;
    if(!appId) return alert('Ingrese App ID');
    accessToken = 'dummy'; 
    document.getElementById('configScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadMockData();
}

function loadMockData() {
    // Datos de ejemplo para ver el diseño
    accountsData = [
        { id: '1', name: 'Tienda de Moda ABC', spend: 150000, revenue: 950000, roas: 6.33, purchases: 145, ctr: 2.1, clicks: 4500, costPerPurchase: 1034 },
        { id: '2', name: 'Gimnasio FitLife', spend: 80000, revenue: 120000, roas: 1.5, purchases: 12, ctr: 1.2, clicks: 1200, costPerPurchase: 6666 }
    ];
    renderOverview();
    renderMetricsMenu();
    renderDetail();
}

// ══════════════════════════════════════
// RENDER METRIC SELECTOR
// ══════════════════════════════════════
function renderMetricsMenu() {
    const menu = document.getElementById('metricsMenu');
    menu.innerHTML = `<div style="font-weight:700;font-size:10px;color:var(--text3);margin-bottom:8px;text-transform:uppercase">Métricas en tabla</div>`;
    
    METRICS_DEFS.forEach(m => {
        const item = document.createElement('label');
        item.className = 'metric-option';
        item.innerHTML = `
            <input type="checkbox" ${visibleMetrics.has(m.key) || m.always ? 'checked' : ''} 
                   ${m.always ? 'disabled' : ''} 
                   onchange="toggleMetric('${m.key}')">
            <span>${m.label}</span>
        `;
        menu.appendChild(item);
    });
}

function toggleMetric(key) {
    if (visibleMetrics.has(key)) visibleMetrics.delete(key);
    else visibleMetrics.add(key);
    renderDetail();
}

// ══════════════════════════════════════
// RENDER DETAIL & TOP ADS
// ══════════════════════════════════════
function renderDetail() {
    const head = document.getElementById('detailHead');
    const body = document.getElementById('detailBody');
    
    // Header
    let headHtml = '<tr><th>Cuenta</th>';
    METRICS_DEFS.filter(m => m.always || visibleMetrics.has(m.key)).forEach(m => {
        headHtml += `<th>${m.label}</th>`;
    });
    headHtml += '<th></th></tr>';
    head.innerHTML = headHtml;

    // Body
    body.innerHTML = '';
    accountsData.forEach(acc => {
        const tr = document.createElement('tr');
        tr.className = 'clickable';
        tr.onclick = () => toggleAdExpansion(acc.id);
        
        let rowHtml = `<td><strong>${acc.name}</strong></td>`;
        METRICS_DEFS.filter(m => m.always || visibleMetrics.has(m.key)).forEach(m => {
            let val = acc[m.key];
            if(m.key === 'roas') val = '×' + fmtDec(val);
            else if(m.key === 'spend' || m.key === 'revenue' || m.key === 'costPerPurchase') val = '$' + fmtN(val);
            else val = fmtN(val);
            rowHtml += `<td>${val}</td>`;
        });
        rowHtml += `<td style="color:var(--text3)">▼</td>`;
        tr.innerHTML = rowHtml;
        body.appendChild(tr);

        // Sub-fila de Anuncios Ganadores
        const subTr = document.createElement('tr');
        subTr.id = `ads-${acc.id}`;
        subTr.style.display = 'none';
        subTr.innerHTML = `
            <td colspan="20" style="background:var(--bg2); padding: 20px;">
                <div class="top-ads-section">
                    <div class="top-ads-header">
                        <span class="top-ads-title">🏆 Anuncios Ganadores del Período</span>
                        <span style="font-size:11px; color:var(--text3)">Ordenados por ROAS</span>
                    </div>
                    <div class="ads-horizontal-scroll">
                        ${renderMockAds(acc)}
                    </div>
                </div>
            </td>
        `;
        body.appendChild(subTr);
    });
}

function toggleAdExpansion(id) {
    const el = document.getElementById(`ads-${id}`);
    el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
}

function renderMockAds(acc) {
    // Mock de anuncios para mostrar el nuevo diseño
    const ads = [
        { name: 'Video Reel - Producto Verano', purchases: 45, revenue: 350000, spend: 40000, roas: 8.75 },
        { name: 'Carrusel Beneficios 01', purchases: 32, revenue: 210000, spend: 35000, roas: 6.0 },
        { name: 'Imagen Estática - Promo 2x1', purchases: 20, revenue: 150000, spend: 30000, roas: 5.0 }
    ];

    // Calculamos el máximo para escalar las barras de performance
    const maxRev = Math.max(...ads.map(a => a.revenue));
    const maxPurch = Math.max(...ads.map(a => a.purchases));
    const maxRoas = Math.max(...ads.map(a => a.roas));

    return ads.map(ad => `
        <div class="ad-row-card">
            <div class="ad-row-thumb" style="background-image:url('https://via.placeholder.com/110'); background-size:cover;"></div>
            <div class="ad-row-body">
                <div class="ad-row-info">
                    <div class="ad-row-name">${ad.name}</div>
                    <div class="ad-row-meta">ID: 23850912384 &nbsp; · &nbsp; Activo</div>
                </div>

                <div class="ad-perf-chart">
                    <div class="perf-bar-group">
                        <div class="perf-label-row"><span>Compras</span><span>${ad.purchases}</span></div>
                        <div class="perf-bar-bg"><div class="perf-bar-fill" style="width:${(ad.purchases/maxPurch)*100}%; background:var(--blue)"></div></div>
                    </div>
                    <div class="perf-bar-group">
                        <div class="perf-label-row"><span>Facturación</span><span>$${fmtN(ad.revenue)}</span></div>
                        <div class="perf-bar-bg"><div class="perf-bar-fill" style="width:${(ad.revenue/maxRev)*100}%; background:var(--green)"></div></div>
                    </div>
                    <div class="perf-bar-group">
                        <div class="perf-label-row"><span>ROAS</span><span>×${ad.roas}</span></div>
                        <div class="perf-bar-bg"><div class="perf-bar-fill" style="width:${(ad.roas/maxRoas)*100}%; background:var(--amber)"></div></div>
                    </div>
                </div>

                <div class="ad-row-main-metrics">
                    <div class="ad-main-metric">
                        <div class="label">ROAS</div>
                        <div class="val" style="color:var(--green)">×${ad.roas}</div>
                    </div>
                    <div class="ad-main-metric">
                        <div class="label">Invertido</div>
                        <div class="val">$${fmtN(ad.spend)}</div>
                    </div>
                </div>
                
                <button class="btn btn-sm" onclick="window.open('#')">Ver Preview</button>
            </div>
        </div>
    `).join('');
}

function renderOverview() {
    const cards = document.getElementById('summaryCards');
    cards.innerHTML = `
        <div class="stat-card"><div class="stat-label">Facturación</div><div class="stat-value">$${fmtN(1070000)}</div></div>
        <div class="stat-card"><div class="stat-label">Inversión</div><div class="stat-value">$${fmtN(230000)}</div></div>
        <div class="stat-card"><div class="stat-label">ROAS Promedio</div><div class="stat-value">×4.65</div></div>
        <div class="stat-card"><div class="stat-label">Cuentas</div><div class="stat-value">2</div></div>
    `;
    
    const body = document.getElementById('overviewBody');
    body.innerHTML = accountsData.map(acc => `
        <tr>
            <td>${acc.name}</td>
            <td>$1.000.000</td>
            <td><div class="prog"><div class="prog-bar"><div class="prog-fill" style="width:80%;background:var(--green)"></div></div><span>80%</span></div></td>
            <td>$${fmtN(acc.revenue)}</td>
            <td>×${acc.roas}</td>
            <td><span class="badge" style="background:var(--green-bg);color:var(--green-tc)">En Objetivo</span></td>
        </tr>
    `).join('');
}

function switchPage(p) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
}

function logout() { location.reload(); }

// Cerrar dropdown al clickear fuera
window.onclick = function(event) {
    if (!event.target.closest('.metrics-dropdown')) {
        document.getElementById('metricsMenu').classList.remove('show');
    }
}
</script>
</body>
</html>
