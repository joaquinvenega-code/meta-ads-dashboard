<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control ROAS — Dashboard interno de métricas publicitarias</title>
<meta name="description" content="Herramienta interna para equipos de marketing que permite visualizar el rendimiento de sus propias cuentas publicitarias vía API oficial.">
<meta name="robots" content="noindex,nofollow">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b96;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --radius:8px;--radius-lg:12px;
  --blue:#1877F2;--blue-bg:#e8f0fd;--blue-tc:#0d47a1;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-tc:#085041;
  --amber:#EF9F27;--amber-bg:#FAEEDA;--amber-tc:#633806;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-tc:#791F1F;
  --gray:#888780;--gray-bg:#F1EFE8;--gray-tc:#2C2C2A;
  --sidebar:220px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --text:#f0efe9;--text2:#a0a09a;--text3:#6b6b67;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --blue-bg:#1a2a4a;--blue-tc:#90b8f8;
  --green-bg:#0d2b22;--green-tc:#9FE1CB;
  --amber-bg:#2b1f08;--amber-tc:#FAC775;
  --red-bg:#2b0f0f;--red-tc:#F7C1C1;
  --gray-bg:#2a2a27;--gray-tc:#D3D1C7;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;transition:background .12s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{opacity:.88}
.btn-danger{color:var(--red);border-color:var(--red)}
.btn-fb{display:flex;align-items:center;gap:10px;padding:12px 20px;background:#1877F2;color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;width:100%;justify-content:center}

/* ── INPUTS ── */
.inp{width:100%;padding:8px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text)}

/* ── CONFIG / LOGIN ── */
#configScreen{max-width:500px;margin:40px auto;padding:0 16px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px}

/* ── APP LAYOUT ── */
#app{display:none;min-height:100vh}
.app-layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:20px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-nav{flex:1;padding:12px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-item.active{background:var(--blue-bg);color:var(--blue)}
.main{flex:1;min-width:0;padding:24px}
.page{display:none}
.page.active{display:block}

/* ── METRICS DROPDOWN ── */
.metrics-dropdown{position:relative;display:inline-block}
.metrics-content{display:none;position:absolute;right:0;top:100%;margin-top:8px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:12px;box-shadow:0 10px 25px rgba(0,0,0,0.1);z-index:100;min-width:220px}
.metrics-content.show{display:block}
.metric-option{display:flex;align-items:center;gap:10px;padding:6px 8px;cursor:pointer;border-radius:6px;font-size:13px}
.metric-option:hover{background:var(--bg2)}
.metric-option input{accent-color:var(--blue);width:15px;height:15px}

/* ── TABLES ── */
.tbl-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-weight:600;font-size:11px;color:var(--text2);text-transform:uppercase;background:var(--bg2);border-bottom:1.5px solid var(--border)}
td{padding:10px 12px;border-bottom:0.5px solid var(--border)}
tr.clickable:hover td{background:var(--bg2);cursor:pointer}

/* ── TOP ADS HORIZONTAL REDESIGN ── */
.top-ads-section{margin-top:16px;border-top:1.5px solid var(--border);padding-top:16px}
.ads-list-container{display:flex;flex-direction:column;gap:12px}
.ad-row-card{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;height:120px;align-items:stretch}
.ad-row-thumb{width:120px;height:120px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.ad-row-body{flex:1;padding:12px 20px;display:flex;align-items:center;gap:24px;min-width:0}
.ad-row-info{flex:1.5;min-width:0}
.ad-row-name{font-size:12px;font-weight:700;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ad-row-perf{flex:2;padding:0 20px;border-left:1px solid var(--border);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.perf-bar-group{display:flex;flex-direction:column;gap:2px}
.perf-label-row{display:flex;justify-content:space-between;font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase}
.perf-bar-bg{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;width:100%}
.perf-bar-fill{height:100%;border-radius:3px}
.ad-row-metrics{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ad-row-roas-val{font-size:18px;font-weight:800;color:var(--green)}

/* ── STATS & PROGRESS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.prog{display:flex;align-items:center;gap:7px;min-width:110px}
.prog-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="configScreen">
  <div class="card" style="text-align:center">
    <h1 style="margin-bottom:8px">Control ROAS</h1>
    <p style="color:var(--text2);font-size:13px;margin-bottom:24px">Dashboard interno de métricas publicitarias</p>
    <input class="inp" id="appIdInput" placeholder="Ingresá tu Meta App ID" style="margin-bottom:12px">
    <button class="btn-fb" onclick="initFBLogin()">Iniciar sesión con Facebook</button>
    <p id="alertMsg" style="color:var(--red);font-size:12px;margin-top:10px;display:none"></p>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><strong>Control ROAS</strong></div>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="switchPage('overview')" id="nav-overview">Vista General</button>
        <button class="nav-item" onclick="switchPage('detail')" id="nav-detail">Detalle de cuentas</button>
      </nav>
      <div style="padding:16px;border-top:0.5px solid var(--border)">
        <button class="btn btn-sm" style="width:100%" onclick="logout()">Cerrar sesión</button>
      </div>
    </aside>

    <main class="main">
      <!-- VISTA GENERAL -->
      <div class="page active" id="page-overview">
        <div class="stat-grid" id="summaryCards"></div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Cuenta</th><th>Objetivo</th><th>Progreso</th><th>Facturado</th><th>Invertido</th><th>ROAS</th><th>Estado</th></tr></thead>
            <tbody id="overviewBody"></tbody>
          </table>
        </div>
      </div>

      <!-- DETALLE DE CUENTAS -->
      <div class="page" id="page-detail">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <h2 style="font-size:18px">Detalle de cuentas</h2>
          <div class="metrics-dropdown">
            <button class="btn" onclick="toggleMetricsMenu(event)">⚙ Columnas visibles ▼</button>
            <div class="metrics-content" id="metricsMenu">
              <div style="font-weight:700;font-size:10px;color:var(--text3);margin-bottom:8px;text-transform:uppercase">Métricas a mostrar</div>
              <div id="metricsOptionsList"></div>
            </div>
          </div>
        </div>
        
        <div class="tbl-wrap">
          <table>
            <thead id="detailHead"></thead>
            <tbody id="detailBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
// ══════════════════════════════════════
// STATE & CONFIG
// ══════════════════════════════════════
let accessToken = '';
let accountsData = [];
let allAdAccounts = [];
const today = new Date();
const monthProgress = today.getDate() / new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();

// Definición de métricas para el selector
const METRIC_DEFS = [
    { key:'spend',           label:'Invertido',           always:true },
    { key:'revenue',         label:'Facturado',            always:true },
    { key:'roas',            label:'ROAS',                 always:true },
    { key:'objetivo',        label:'Objetivo'              },
    { key:'objPct',          label:'% Objetivo'            },
    { key:'budgetPct',       label:'% Presupuesto'         },
    { key:'ctr',             label:'CTR'                   },
    { key:'clicks',          label:'Clics'                 },
    { key:'purchases',       label:'Compras'               },
    { key:'costPerPurchase', label:'Costo x Compra'        },
    { key:'messagesReal',    label:'Mensajes'              }
];

let visibleCols = new Set(JSON.parse(localStorage.getItem('cr_viscols')) || ['spend','revenue','roas','objPct','purchases','costPerPurchase']);
let settings = JSON.parse(localStorage.getItem('cr_settings') || '{}');

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
const fmtN = n => new Intl.NumberFormat('es-AR').format(Math.round(n || 0));
const fmtDec = n => new Intl.NumberFormat('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2}).format(n || 0);

function toggleMetricsMenu(e) {
    e.stopPropagation();
    document.getElementById('metricsMenu').classList.toggle('show');
}

document.addEventListener('click', () => {
    document.getElementById('metricsMenu').classList.remove('show');
});

// ══════════════════════════════════════
// AUTH & DATA
// ══════════════════════════════════════
function initFBLogin() {
  const appId = document.getElementById('appIdInput').value;
  if(!appId) return alert("Ingresá un App ID");
  
  window.fbAsyncInit = function() {
    FB.init({ appId: appId, cookie:true, xfbml:false, version:'v19.0' });
    FB.login(res => {
      if(res.authResponse) {
        accessToken = res.authResponse.accessToken;
        loadData();
      }
    }, {scope:'ads_read,ads_management'});
  };
  (function(d, s, id){
     var js, fjs = d.getElementsByTagName(s)[0];
     if (d.getElementById(id)) {return;}
     js = d.createElement(s); js.id = id;
     js.src = "https://connect.facebook.net/es_LA/sdk.js";
     fjs.parentNode.insertBefore(js, fjs);
   }(document, 'script', 'facebook-jssdk'));
}

async function loadData() {
    document.getElementById('configScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    
    // Simulación de carga / Llamada real a FB se insertaría aquí
    // Para este ejemplo, generamos datos mock basados en tu estructura:
    accountsData = [
        { id:'1', name:'Cliente E-commerce Alpha', spend:250000, revenue:1850000, roas:7.4, purchases:210, clicks:8500, ctr:1.8, costPerPurchase: 1190, messagesReal: 0 },
        { id:'2', name:'Cliente Servicios Beta', spend:85000, revenue:125000, roas:1.47, purchases:10, clicks:2200, ctr:0.9, costPerPurchase: 8500, messagesReal: 145 }
    ];
    
    renderOverview();
    renderMetricsSelector();
    renderDetail();
}

// ══════════════════════════════════════
// RENDERS
// ══════════════════════════════════════
function renderMetricsSelector() {
    const container = document.getElementById('metricsOptionsList');
    container.innerHTML = '';
    METRIC_DEFS.forEach(m => {
        const div = document.createElement('label');
        div.className = 'metric-option';
        div.innerHTML = `
            <input type="checkbox" ${m.always || visibleCols.has(m.key) ? 'checked' : ''} 
                   ${m.always ? 'disabled' : ''} 
                   onchange="toggleColumn('${m.key}')">
            <span>${m.label}</span>
        `;
        container.appendChild(div);
    });
}

function toggleColumn(key) {
    if(visibleCols.has(key)) visibleCols.delete(key);
    else visibleCols.add(key);
    localStorage.setItem('cr_viscols', JSON.stringify([...visibleCols]));
    renderDetail();
}

function renderOverview() {
    const totalRev = accountsData.reduce((a,c) => a+c.revenue, 0);
    const totalSpend = accountsData.reduce((a,c) => a+c.spend, 0);
    
    document.getElementById('summaryCards').innerHTML = `
        <div class="stat-card"><div style="font-size:11px;color:var(--text2)">FACTURACIÓN</div><div style="font-size:22px;font-weight:700">$${fmtN(totalRev)}</div></div>
        <div class="stat-card"><div style="font-size:11px;color:var(--text2)">INVERSIÓN</div><div style="font-size:22px;font-weight:700">$${fmtN(totalSpend)}</div></div>
        <div class="stat-card"><div style="font-size:11px;color:var(--text2)">ROAS PROM.</div><div style="font-size:22px;font-weight:700">×${fmtDec(totalRev/totalSpend)}</div></div>
        <div class="stat-card"><div style="font-size:11px;color:var(--text2)">CUENTAS</div><div style="font-size:22px;font-weight:700">${accountsData.length}</div></div>
    `;

    const body = document.getElementById('overviewBody');
    body.innerHTML = accountsData.map(acc => {
        const obj = settings[acc.id]?.objective || 1000000;
        const objPct = (acc.revenue / obj) * 100;
        return `
            <tr>
                <td><strong>${acc.name}</strong></td>
                <td>$${fmtN(obj)}</td>
                <td>
                    <div class="prog">
                        <div class="prog-bar"><div class="prog-fill" style="width:${Math.min(objPct,100)}%;background:var(--green)"></div></div>
                        <span style="font-weight:700">${Math.round(objPct)}%</span>
                    </div>
                </td>
                <td>$${fmtN(acc.revenue)}</td>
                <td>$${fmtN(acc.spend)}</td>
                <td style="font-weight:700">×${fmtDec(acc.roas)}</td>
                <td><span class="badge" style="background:var(--green-bg);color:var(--green-tc)">En Objetivo</span></td>
            </tr>
        `;
    }).join('');
}

function renderDetail() {
    const head = document.getElementById('detailHead');
    const body = document.getElementById('detailBody');
    
    const activeMetrics = METRIC_DEFS.filter(m => m.always || visibleCols.has(m.key));
    
    head.innerHTML = `<tr><th>Cuenta</th>${activeMetrics.map(m => `<th>${m.label}</th>`).join('')}<th></th></tr>`;
    
    body.innerHTML = '';
    accountsData.forEach(acc => {
        const tr = document.createElement('tr');
        tr.className = 'clickable';
        tr.onclick = () => toggleRow(acc.id);
        
        let cells = `<td><strong>${acc.name}</strong></td>`;
        activeMetrics.forEach(m => {
            let val = acc[m.key];
            if(m.key === 'roas') val = '×' + fmtDec(val);
            else if(['spend','revenue','costPerPurchase'].includes(m.key)) val = '$' + fmtN(val);
            else if(m.key === 'objPct') val = Math.round((acc.revenue / (settings[acc.id]?.objective || 1000000)) * 100) + '%';
            else val = fmtN(val);
            cells += `<td>${val}</td>`;
        });
        cells += `<td><span id="icon-${acc.id}">▼</span></td>`;
        tr.innerHTML = cells;
        body.appendChild(tr);

        // Fila expansible para anuncios
        const expandTr = document.createElement('tr');
        expandTr.id = `exp-${acc.id}`;
        expandTr.style.display = 'none';
        expandTr.innerHTML = `
            <td colspan="20" style="background:var(--bg2);padding:24px">
                <div class="top-ads-section">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                        <span class="top-ads-title">🏆 Anuncios Ganadores (Top performance)</span>
                    </div>
                    <div class="ads-list-container" id="ads-list-${acc.id}">
                        Cargando anuncios...
                    </div>
                </div>
            </td>
        `;
        body.appendChild(expandTr);
    });
}

function toggleRow(id) {
    const row = document.getElementById(`exp-${id}`);
    const icon = document.getElementById(`icon-${id}`);
    const isOpening = row.style.display === 'none';
    
    row.style.display = isOpening ? 'table-row' : 'none';
    icon.textContent = isOpening ? '▲' : '▼';
    
    if(isOpening) loadHorizontalAds(id);
}

// ══════════════════════════════════════
// NUEVA LÓGICA DE ANUNCIOS HORIZONTALES
// ══════════════════════════════════════
function loadHorizontalAds(accId) {
    const container = document.getElementById(`ads-list-${accId}`);
    
    // Simulamos anuncios traídos de la API
    const ads = [
        { name: "Video_Coleccion_Otoño_01", purchases: 84, revenue: 450000, roas: 9.2, spend: 48913, thumb: "https://picsum.photos/id/20/120/120" },
        { name: "Carrusel_Ofertas_Semana", purchases: 52, revenue: 310000, roas: 6.5, spend: 47692, thumb: "https://picsum.photos/id/25/120/120" },
        { name: "Estatico_Promo_2x1_Marzo", purchases: 31, revenue: 120000, roas: 4.1, spend: 29268, thumb: "https://picsum.photos/id/30/120/120" }
    ];

    // Calculamos máximos para las barras de gráfico
    const maxPurch = Math.max(...ads.map(a => a.purchases));
    const maxRev = Math.max(...ads.map(a => a.revenue));
    const maxRoas = Math.max(...ads.map(a => a.roas));

    container.innerHTML = ads.map(ad => `
        <div class="ad-row-card">
            <img src="${ad.thumb}" class="ad-row-thumb">
            <div class="ad-row-body">
                <div class="ad-row-info">
                    <div class="ad-row-name" title="${ad.name}">${ad.name}</div>
                    <div style="font-size:10px;color:var(--text3);margin-bottom:8px">Activo · Desktop & Mobile Feed</div>
                    <button class="btn btn-xs" style="color:var(--blue)">↗ Ver en Facebook</button>
                </div>

                <div class="ad-row-perf">
                    <div class="perf-bar-group">
                        <div class="perf-label-row"><span>Compras</span><span>${ad.purchases}</span></div>
                        <div class="perf-bar-bg"><div class="perf-bar-fill" style="width:${(ad.purchases/maxPurch)*100}%;background:var(--blue)"></div></div>
                    </div>
                    <div class="perf-bar-group">
                        <div class="perf-label-row"><span>Facturación</span><span>$${fmtN(ad.revenue)}</span></div>
                        <div class="perf-bar-bg"><div class="perf-bar-fill" style="width:${(ad.revenue/maxRev)*100}%;background:var(--green)"></div></div>
                    </div>
                    <div class="perf-bar-group">
                        <div class="perf-label-row"><span>ROAS</span><span>×${ad.roas}</span></div>
                        <div class="perf-bar-bg"><div class="perf-bar-fill" style="width:${(ad.roas/maxRoas)*100}%;background:var(--amber)"></div></div>
                    </div>
                </div>

                <div class="ad-row-metrics">
                    <div style="font-size:10px;color:var(--text3);text-transform:uppercase">ROAS Individual</div>
                    <div class="ad-row-roas-val">×${fmtDec(ad.roas)}</div>
                    <div style="font-size:11px;color:var(--text2);margin-top:4px">Invertido: $${fmtN(ad.spend)}</div>
                </div>
            </div>
        </div>
    `).join('');
}

function switchPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`page-${name}`).classList.add('active');
    document.getElementById(`nav-${name}`).classList.add('active');
}

function logout() { location.reload(); }
</script>
</body>
</html>
